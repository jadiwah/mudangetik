<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal | MudaNgetik</title>
    <!-- Memanggil SDK Supabase resmi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- PALET WARNA NAVY GOLD --- */
        :root {
            --bg-dark: #0a192f;
            --bg-card: #112240;
            --bg-input: #172a45;
            --neon-gold: #FFD700;
            --text-white: #ffffff;
            --text-gray: #8892b0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- KOTAK DIALOG LOGIN --- */
        .login-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-card);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .brand-logo {
            font-size: 26px;
            font-weight: bold;
            color: var(--neon-gold);
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 35px;
        }

        /* --- STILISASI FORM INPUT --- */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--neon-gold);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-input);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 6px;
            color: var(--text-white);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--neon-gold);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
        }

        /* --- TOMBOL MASUK --- */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--neon-gold);
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }

        /* --- KETERANGAN FOOTER --- */
        .login-footer {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .login-footer a {
            color: var(--neon-gold);
            text-decoration: none;
            font-weight: bold;
        }

        /* Notifikasi Eror */
        .error-msg {
            background-color: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            font-size: 13px;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="brand-logo">ZONA AKSES</div>
        <div class="brand-tagline">MudaNgetik Stellar Zone</div>

        <!-- Box Notifikasi Error Custom -->
        <div id="error-box" class="error-msg">Akses ditolak! Email atau Password salah.</div>

        <!-- FORM LOGIN -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Terdaftar</label>
                <input type="email" id="email" placeholder="Masukkan email pendaftaran dari Lynk.id" required>
            </div>

            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Masuk ke Zona Akses 🚀</button>
        </form>

        <div class="login-footer">
            Belum terdaftar di antrean? <a href="https://lynk.id/suksesbarengjalurlangit/7rexmx8p5mon" target="_blank">Daftarkan Sekarang,Gratis </a>
        </div>
    </div>

    <!-- ================= SCRIPT LOGIKA VALIDASI & SUPABASE ================= -->
    <script>
        // 1. Inisialisasi Koneksi Supabase Berdasarkan Akun Proyekmu
        const SUPABASE_URL = "https://ynaebyuhfxdokmtvuris.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluYWVieXVoZnhkb2ttdHZ1cmlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTEwNjIsImV4cCI6MjA5OTA4NzA2Mn0.BbnlJQwH6eE3LTDtoh8QQvp8seeBAKikwDi6cSznoRY";
        
        // Membentuk client database
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Menangkap Event Klik/Submit Form Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Menahan reload browser otomatis

            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('error-box');

            // Sembunyikan box error setiap kali user mencoba submit ulang
            errorBox.style.display = "none";

            try {
                // Menembak query pencarian ke tabel database Supabase milikmu
                const { data, error } = await supabaseClient
                    .from('user_access')
                    .select('*')
                    .eq('email', emailInput)
                    .eq('password', passwordInput)
                    .maybeSingle(); // Mengambil 1 baris data jika datanya valid

                if (error || !data) {
                    // Tampilkan pesan error estetik jika tidak ditemukan / salah password
                    errorBox.textContent = "Akses ditolak! Email atau Password salah. Gunakan pola: namadepan@mudangetik";
                    errorBox.style.display = "block";
                    return;
                }

                // JIKA SUKSES: Kunci data email dan jenis hak akses ke dalam memori browser lokal
                localStorage.setItem('user_email', data.email);
                localStorage.setItem('user_membership', data.membership_type);

                // Langsung arahkan user menembus halaman Dashboard Utama
                window.location.href = "dashboard.html";

            } catch (err) {
                // Penanganan jika internet user putus atau gangguan jaringan luar
                errorBox.textContent = "Terjadi gangguan koneksi sistem. Silakan coba lagi.";
                errorBox.style.display = "block";
            }
        });
    </script>
</body>

</html>
