<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Zone - MudaNgetik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Background Khas MudaNgetik */
        body {
            margin: 0;
            padding: 0;
            background-color: #030712; /* Gelap premium */
            color: #FFFFFF;
            font-family: 'Inter', 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Kontainer Utama Melengkung Modern */
        #container-member {
            background: #070B18;
            border: 1px solid rgba(212, 175, 55, 0.25); /* Semburat emas tipis */
            max-width: 600px;
            width: 90%;
            padding: 40px 30px;
            border-radius: 24px; /* Lengkungan halus konsisten */
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
        }

        #container-member:hover {
            transform: translateY(-3px);
            border-color: rgba(212, 175, 55, 0.4);
        }

        /* Tipografi & Warna Emas */
        h1 {
            font-size: 2rem;
            margin: 10px 0 20px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .gold-text {
            color: #D4AF37; /* Neon Gold */
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* Badge Status Kapsul Melengkung */
        .badge-status {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Deskripsi Konten */
        .desc-text {
            color: #B0B3B8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 auto 25px auto;
            max-width: 480px;
        }

        /* Kotak Info Box Tambahan */
        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
        }

        .info-box p {
            font-size: 0.85rem;
            color: #CCD6F6;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- SLIDE 4: MEMBER ZONE (COMING SOON VIA EMAIL INFO) -->
    <section id="container-member">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">🔐</div>
        <h1>MEMBER ZONE <span class="gold-text">MudaNgetik</span></h1>
        
        <div class="badge-status">Akan Segera Hadir</div>
        
        <p class="desc-text">
            Tempat eksklusif untukmu mengakses seluruh materi premium, update template otomatis, dan tutorial keren lainnya.
        </p>
        
        <div class="info-box">
            <p>
                Informasi login dan akses akun VIP akan dikirimkan secara berkala melalui email resmi pendaftaranmu kawan. Pantau terus inbox-mu!
            </p>
        </div>
    </section>

</body>
</html>
