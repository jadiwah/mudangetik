<!DOCTYPE html>
<html lang="id">

<head>
    <script>
    (function() {
        // 1. Cek apakah perangkat ini sudah pernah login
        const sessionEmail = localStorage.getItem('user_email');

        // 2. Jika tidak ada data login (belum terdaftar/belum login)
        if (!sessionEmail) {
            // Langsung tendang ke halaman login utama
            window.location.href = "https://mudangetik.com/memberzone"; 
        }
    })();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Edition | Formula Worth It</title>
    <style>
        /* --- RESET & PALET WARNA NAVY GOLD --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a192f;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- CONTAINER UTAMA STREAMING FLOW --- */
        .e-book-premium-flow {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            padding: 25px 15px;
            box-sizing: border-box;
            background: #0a192f;
        }

        /* --- HEADER TEKS --- */
        .e-book-premium-flow h2 {
            color: #FFD700;
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .e-book-premium-flow p {
            color: #8892b0;
            text-align: center;
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 35px;
        }

        /* --- STILISASI GAMBAR E-BOOK --- */
        .ebook-page {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 22px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .ebook-page:hover {
            transform: scale(1.01);
            border-color: rgba(255, 215, 0, 0.3);
        }
    </style>
</head>

<body>

    <div class="e-book-premium-flow">

        <h2>⭐ Formula Worth It Premium Edition</h2>
        <p>Akses Eksklusif Offline Lifetime VIP</p>

        <!-- Wadah kosong tempat menampung 70+ gambar secara otomatis -->
        <div id="pustaka-gambar-vip"></div>

    </div>

    <!-- ================= SCRIPT LOOPING OTOMATIS ================= -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Tentukan total halaman e-book kamu di sini (misal ada 72 halaman)
            const totalHalaman = 72; 
            
            // 2. Ambil elemen wadah HTML di atas
            const wadahGambar = document.getElementById("pustaka-gambar-vip");
            let susunanHtml = "";

            // 3. Lakukan looping dari halaman 1 sampai selesai
            for (let i = 1; i <= totalHalaman; i++) {
                // Menyusun tag <img> secara berurutan sesuai format rename Windows kamu
                susunanHtml += `<img src="formula page (${i}).jpg" alt="Halaman ${i}" class="ebook-page" loading="lazy">`;
            }

            // 4. Masukkan seluruh susunan gambar ke dalam wadah HTML
            wadahGambar.innerHTML = susunanHtml;
        });
    </script>
